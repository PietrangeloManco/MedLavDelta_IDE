<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login — Centro Delta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a3a5c; min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg p-4">
                    <h3 class="text-center mb-1 fw-bold">🏥 Centro Delta</h3>
                    <p class="text-center text-muted mb-4">Medicina del Lavoro</p>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label">{{ field.label }}</label>
                                <input type="{{ field.field.widget.input_type }}"
                                       name="{{ field.html_name }}"
                                       class="form-control {% if field.errors %}is-invalid{% endif %}"
                                       {% if field.value %}value="{{ field.value }}"{% endif %}>
                                {% for error in field.errors %}
                                    <div class="invalid-feedback">{{ error }}</div>
                                {% endfor %}
                            </div>
                        {% endfor %}
                        <button type="submit" class="btn w-100 text-white" style="background-color:#1a3a5c">
                            Accedi
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
