{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Centro Delta{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --font-sans: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            --navy: #0f2744;
            --navy-mid: #1a3a5c;
            --accent: #3b82f6;
            --border: #e2e8f0;
            --surface: #ffffff;
            --bg: #f0f4f8;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #166534;
            --success-bg: #dcfce7;
            --danger: #b91c1c;
            --danger-bg: #fee2e2;
        }

        body {
            font-family: var(--font-sans);
            background: radial-gradient(circle at 0% 0%, rgba(59,130,246,0.14), transparent 35%), var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text);
        }

        .auth-shell {
            width: 100%;
            max-width: 520px;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 14px 40px rgba(15,39,68,0.12);
        }

        .auth-brand {
            background: var(--navy);
            padding: 14px 14px 0;
        }

        .auth-brand-box {
            background: #ffffff;
            border-radius: 0 0 10px 10px;
            padding: 12px 14px;
            text-align: center;
        }

        .auth-logo {
            display: block;
            width: 100%;
            max-width: 210px;
            height: auto;
            object-fit: contain;
            margin: 0 auto;
        }

        .auth-brand-sub {
            color: rgba(255,255,255,0.86);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            padding: 12px 2px 14px;
        }

        .auth-body {
            padding: 24px;
        }

        .auth-title {
            font-size: 26px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 22px;
            line-height: 1.6;
        }

        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: var(--font-sans);
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .form-control.is-invalid { border-color: var(--danger); }

        .form-error {
            margin-top: 5px;
            color: var(--danger);
            font-size: 12px;
        }

        .form-alert {
            border-radius: 8px;
            font-size: 13px;
            padding: 12px;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .form-alert.success {
            background: var(--success-bg);
            border: 1px solid #86efac;
            color: var(--success);
        }

        .form-alert.error {
            background: var(--danger-bg);
            border: 1px solid #fca5a5;
            color: var(--danger);
        }

        .btn-submit,
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            padding: 11px 14px;
            transition: background 0.15s, border-color 0.15s;
            text-decoration: none;
        }

        .btn-submit {
            border: none;
            background: var(--navy-mid);
            color: #ffffff;
            margin-top: 4px;
        }

        .btn-submit:hover { background: var(--navy); }

        .btn-secondary {
            border: 1px solid var(--border);
            color: var(--text);
            background: transparent;
            margin-top: 10px;
        }

        .btn-secondary:hover { background: #f8fafc; }

        .auth-footer {
            margin-top: 14px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .auth-links {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .auth-link {
            color: var(--navy-mid);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .auth-link:hover {
            color: var(--navy);
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
                align-items: stretch;
            }

            .auth-shell {
                max-width: none;
            }

            .auth-body {
                padding: 20px;
            }

            .auth-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-brand-box">
                    <img src="{% static 'Logo_oriz.svg' %}" alt="Centro Delta Logo" class="auth-logo">
                </div>
                <div class="auth-brand-sub">Medicina del Lavoro</div>
            </div>
            <div class="auth-body">
                {% block content %}{% endblock %}
            </div>
        </div>
        <div class="auth-footer">Centro Delta Srl - Piattaforma riservata al personale autorizzato</div>
    </div>
</body>
</html>
